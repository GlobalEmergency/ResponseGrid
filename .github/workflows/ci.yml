name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default for every job's GITHUB_TOKEN (jobs opt into more
# only if they need it). Without this the token defaults to broad write scopes.
permissions:
  contents: read

jobs:
  # ── Format check ────────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # prettier lives in apps/api's deps, so run it from there (root has no prettier bin).
      - name: Prettier — api
        run: pnpm --filter api exec prettier --check "src/**/*.ts" "test/**/*.ts"

      # The workspace @globalemergency/* packages carry their own .prettierrc
      # (same config as api). Gate their TS here too, run via api's prettier bin
      # with repo-relative globs.
      - name: Prettier — warehouse packages
        run: pnpm --filter api exec prettier --check "../../packages/warehouse-core/src/**/*.ts" "../../packages/warehouse-postgres/src/**/*.ts"

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Type-aware lint resolves @globalemergency/warehouse-* types from its
      # built dist, so build it first.
      - name: Build — warehouse packages
        run: pnpm --filter '@globalemergency/*' build

      # TODO(#355 follow-up): eslint for @globalemergency/* packages. They ship no
      # runnable eslint config locally (flat config can't resolve the shared
      # plugins from the package root), so a lint step here would break rather
      # than gate. Add it once the packages have a self-contained eslint setup.

      # api lint script has --fix; in CI we want read-only + fail on warnings
      - name: Lint — api
        run: pnpm --filter api exec eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

      - name: Lint — web
        run: pnpm --filter web lint

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Las migraciones son inmutables una vez mergeadas: migrate.sh aplica por
      # NOMBRE DE FICHERO, así que editar/borrar una ya aplicada no se reaplica
      # en prod y rompe el deploy (incidente #237). Solo se permite AÑADIR.
      - name: Guard — migraciones ya mergeadas no se modifican ni borran
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          changed=$(git diff --diff-filter=MD --name-only "origin/$GITHUB_BASE_REF...HEAD" -- 'apps/api/drizzle/*.sql')
          if [ -n "$changed" ]; then
            echo "::error::Estas migraciones ya están en '$GITHUB_BASE_REF' y no se pueden modificar ni borrar: deploy/migrate.sh las aplica por nombre de fichero, así que el cambio NO se reaplica en prod y rompe el deploy (ver #237). Haz fix-forward con una migración nueva (siguiente número libre)."
            printf '  %s\n' $changed
            exit 1
          fi
          echo "OK — ninguna migración existente fue modificada o borrada."

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build — api-client
        run: pnpm --filter @reliefhub/api-client build

      # the warehouse-* packages are workspace dependencies of api: build them (dist/cjs +
      # dist/esm) before nest build resolves them via the exports map.
      - name: Build — warehouse packages
        run: pnpm --filter '@globalemergency/*' build

      - name: Build — api (nest build / tsc)
        run: pnpm --filter api build

      - name: Build — web (next build)
        run: pnpm --filter web build

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reliefhub
          POSTGRES_PASSWORD: reliefhub
          POSTGRES_DB: reliefhub
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U reliefhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # api consumes @globalemergency/warehouse-* via its built dist
      # (ts-jest type resolution + node runtime), so build it first.
      - name: Build — warehouse packages
        run: pnpm --filter '@globalemergency/*' build

      - name: Run tests — api
        env:
          DATABASE_URL: postgres://reliefhub:reliefhub@localhost:5433/reliefhub
          TEST_DATABASE_URL: postgres://reliefhub:reliefhub@localhost:5433/reliefhub_test
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: ci-jwt-secret-32-chars-minimum-ok
          NODE_ENV: test
        run: pnpm --filter api test

      # The web unit tests run via `node --test` on .ts files, which needs Node's
      # native type-stripping (Node ≥ 22.6) — the api runs on 20, so switch the
      # runtime just for this step. Kept in the required Test job so these tests
      # actually gate the merge.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Run tests — web
        run: pnpm --filter web test

      # warehouse-core ships its own domain unit tests: they compile with tsc to
      # a throwaway dir and run via `node --test` on the emitted JS (glob support
      # needs Node ≥ 21, hence after the Node 22 switch above). Kept in the
      # required Test job so the new WMS core actually gates the merge.
      - name: Run tests — warehouse-core
        run: pnpm --filter '@globalemergency/warehouse-core' test

      # warehouse-postgres ships integration tests for the WMS `wms.` schema
      # persistence adapters (the 4 inventory ports + its own migration runner):
      # unlike warehouse-core's pure unit tests these need a real Postgres, so
      # they run in the Test job against the service DB. They create their own
      # `wms` schema in the base `reliefhub` DB → isolated from the api suite's
      # `reliefhub_test`. Kept in the required Test job so the WMS persistence
      # layer actually gates the merge.
      - name: Run tests — warehouse-postgres (integración)
        env:
          TEST_DATABASE_URL: postgres://reliefhub:reliefhub@localhost:5433/reliefhub
        run: pnpm --filter '@globalemergency/warehouse-postgres' test:int

  # ── E2E tests ───────────────────────────────────────────────────────────────
  # The unit/int suite (`Test` job) does NOT cover the HTTP e2e specs under
  # apps/api/test — they run via a separate jest config. Run them here so an
  # endpoint/auth regression fails CI instead of reaching prod.
  e2e:
    name: Test e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reliefhub
          POSTGRES_PASSWORD: reliefhub
          POSTGRES_DB: reliefhub
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U reliefhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # api consumes @globalemergency/warehouse-* via its built dist, so
      # build it before the e2e suite runs.
      - name: Build — warehouse packages
        run: pnpm --filter '@globalemergency/*' build

      - name: Run e2e tests — api
        env:
          DATABASE_URL: postgres://reliefhub:reliefhub@localhost:5433/reliefhub
          TEST_DATABASE_URL: postgres://reliefhub:reliefhub@localhost:5433/reliefhub_test
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: ci-jwt-secret-32-chars-minimum-ok
          NODE_ENV: test
        run: pnpm --filter api test:e2e

  # ── Security ────────────────────────────────────────────────────────────────
  # Fails the build on a known-vulnerable production dependency, and (on PRs)
  # reviews the dependency delta the PR introduces.
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Blocks a PR that pulls in a dependency with a known CVE or a
      # disallowed license. PR-only (needs the base ref to diff against).
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on a High/Critical advisory in the production dependency tree
      # (this is exactly what would have caught the multer 2.1.1 DoS advisory).
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  # ── Semgrep (SAST) ──────────────────────────────────────────────────────────
  # Pattern-based static analysis: community rulesets + this repo's own rules in
  # .semgrep/. Results are uploaded to the Security tab; the scan step is
  # non-blocking on purpose so a baseline of preexisting findings can be triaged
  # before this is promoted to a required check.
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Semgrep
        run: pipx install semgrep==1.168.0

      - name: Semgrep scan
        continue-on-error: true
        run: >-
          semgrep scan
          --config p/typescript
          --config p/javascript
          --config p/nodejs
          --config p/react
          --config p/owasp-top-ten
          --config .semgrep/
          --sarif --output semgrep.sarif

      - name: Upload SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep.sarif

  # ── Migrate smoke test ──────────────────────────────────────────────────────
  # Runs the ACTUAL prod migration runner (deploy/migrate.sh) against a real
  # Postgres and asserts it (1) applies cleanly and (2) is idempotent on re-run.
  # This is the check that would have caught the psql `:'var'` interpolation bug
  # that broke the EC2 deploy — the unit/e2e gate never exercises migrate.sh.
  migrate-smoke:
    name: Migrate smoke test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reliefhub
          POSTGRES_PASSWORD: reliefhub
          POSTGRES_DB: reliefhub
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U reliefhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # migrate.sh reads these; PGHOST/PGPORT/MIGRATIONS_DIR override the prod
      # container defaults so the same script runs against the mapped service.
      PGHOST: localhost
      PGPORT: "5433"
      POSTGRES_USER: reliefhub
      POSTGRES_PASSWORD: reliefhub
      POSTGRES_DB: reliefhub
      MIGRATIONS_DIR: ${{ github.workspace }}/apps/api/drizzle

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migrations (fresh DB)
        run: sh deploy/migrate.sh

      - name: Re-run must be idempotent (nothing re-applied)
        run: |
          out=$(sh deploy/migrate.sh)
          echo "$out"
          if echo "$out" | grep -q '^apply '; then
            echo "::error::migrate.sh no es idempotente: reaplicó migraciones en la segunda pasada"
            exit 1
          fi
          echo "OK — segunda pasada sin reaplicar (idempotente)."
